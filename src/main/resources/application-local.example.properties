# Copy this file to `application-local.properties` and fill in real values.
# `application-local.properties` is git-ignored so your secrets are never committed.

# JWT
# IMPORTANT: the secret must be at least 32 characters (256 bits). A shorter key
# makes HS256 signing throw WeakKeyException at the first login/register.
jwt.secret=change-me-to-a-long-random-secret-at-least-32-chars
jwt.expiration=86400000


# Database (replace with your local credentials)

spring.datasource.url=jdbc:postgresql://localhost:5432/YOUR_DATABASE_NAME
spring.datasource.username=YOUR_DATABASE_USERNAME
spring.datasource.password=YOUR_DATABASE_PASSWORD
